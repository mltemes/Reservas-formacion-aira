<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas Formación Aira</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
  color: #1f2937;
}
header {
  display: flex;
  align-items: center;
  background: white;
  padding: 15px 25px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
header img {
  height: 70px;
  width: auto;
  margin-right: 20px;
}
.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.notice {
  font-size: 13px;
  color: #666;
  line-height: 1.5;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}
.card h3 {
  margin-top: 0;
  margin-bottom: 8px;
}
.desc {
  color: #555;
  font-size: 14px;
  margin-bottom: 10px;
  min-height: 38px;
}
.counter {
  font-size: 16px;
  font-weight: bold;
  margin: 10px 0 4px;
}
.small {
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
}
.progress {
  width: 100%;
  height: 10px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-bar {
  height: 100%;
  background: #8cc63f;
  width: 0%;
  transition: width .2s ease;
}
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}
button {
  background: #8cc63f;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
button:disabled {
  opacity: 0.75;
  cursor: not-allowed;
}
button.full {
  background: #aaa;
}
.export-btn {
  background: #2563eb;
}
.reset-btn {
  background: #dc2626;
}
.list {
  margin-top: 40px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}
.list-item {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}
.list-item:last-child {
  border-bottom: none;
}
.empty {
  color: #666;
}
.status {
  margin-top: 14px;
  font-size: 13px;
  color: #444;
}
.status.error {
  color: #b91c1c;
}
.status.ok {
  color: #166534;
}
</style>
</head>

  <h2>Reserva de formación</h2>
</header>

<div class="container">
  <div class="topbar">
    <div class="notice">
      Cada turno tiene un máximo de 13 plazas. Cada email solo puede reservar una vez.
    </div>
    <div class="actions">
      <button class="export-btn" onclick="exportarExcel()">Exportar a Excel por turnos</button>
      <button class="reset-btn" onclick="resetReservas()">Reset</button>
    </div>
  </div>

  <div id="status" class="status">Cargando reservas...</div>
  <div id="slots" class="grid"></div>

  <div class="list">
    <h3>Reservas actuales</h3>
    <div id="reservas"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx8eiWG-RxLYYnUQ5SGodZOHGjN5eYDTkfqgY5LwKaW2AB62j_zPiXnAANpiG3rrkYN8g/exec";
const STORAGE_FALLBACK_KEY = "reservas_aira_fallback";
const PASSWORD_RESET = "@ira2026";

const TURNOS = [
  {id:2, nombre:"Turno 1", descripcion:"Viernes día 20 9:30 - 10:30 en TABOADA", plazas:13},
  {id:3, nombre:"Turno 2", descripcion:"Viernes día 20 16:00 - 17:00 en TABOADA", plazas:13},
  {id:4, nombre:"Turno 3", descripcion:"Viernes día 20 9:30 - 10:30 en FRIOL", plazas:13},
  {id:5, nombre:"Turno 4", descripcion:"Viernes día 20 16:00 - 17:00 en FRIOL", plazas:13}
];

let reservasCache = [];
let usandoModoLocal = false;
render();

function setStatus(text, type) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status" + (type ? " " + type : "");
}

function escapeXml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function getReservas() {
  return reservasCache;
}

function getFallbackReservas() {
  return JSON.parse(localStorage.getItem(STORAGE_FALLBACK_KEY) || "[]");
}

function saveFallbackReservas(data) {
  localStorage.setItem(STORAGE_FALLBACK_KEY, JSON.stringify(data));
}

function apiConfigurada() {
  return API_URL && !API_URL.includes("PEGA_AQUI_TU_URL_DE_APPS_SCRIPT");
}

async function apiGetReservas() {
  const res = await fetch(`${API_URL}?action=list`, { method: "GET" });
  return await res.json();
}

async function apiCrearReserva(data) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      action: "reserve",
      ...data
    })
  });
  return await res.json();
}

async function apiReset(password) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      action: "reset",
      password
    })
  });
  return await res.json();
}

function render() {
  const cont = document.getElementById("slots");
  cont.innerHTML = "";

  TURNOS.forEach(t => {
    const reservas = getReservas().filter(r => Number(r.turno) === t.id);
    const ocupadas = reservas.length;
    const libres = t.plazas - ocupadas;
    const porcentaje = Math.max(0, Math.min(100, (ocupadas / t.plazas) * 100));

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${t.nombre}</h3>
      <div class="desc">${t.descripcion}</div>
      <div class="counter">${ocupadas}/${t.plazas}</div>
      <div class="small">${libres} plazas disponibles</div>
      <div class="progress"><div class="progress-bar" style="width:${porcentaje}%"></div></div>

      <input id="n${t.id}" placeholder="Nombre">
      <input id="e${t.id}" placeholder="Email">

      <button class="${libres <= 0 ? 'full' : ''}" ${libres <= 0 ? "disabled" : ""} onclick="reservar(${t.id})">
        ${libres <= 0 ? "Completo" : "Reservar"}
      </button>
    `;

    cont.appendChild(card);
  });

  mostrarReservas();
}

function mostrarReservas() {
  const r = getReservas();
  const div = document.getElementById("reservas");

  if (!r.length) {
    div.innerHTML = "<p class='empty'>No hay reservas todavía.</p>";
    return;
  }

  div.innerHTML = r.map(x => {
    const turno = TURNOS.find(t => t.id == Number(x.turno));
    const descripcion = x.descripcion || (turno ? turno.descripcion : "");
    return `<div class="list-item"><b>${x.nombre}</b> - ${turno ? turno.nombre : "Turno"} (${descripcion}) - ${x.email}</div>`;
  }).join("");
}

async function recargarReservas() {
  if (!apiConfigurada()) {
    usandoModoLocal = true;
    reservasCache = getFallbackReservas();
    setStatus("La API no está configurada todavía. La página está funcionando en modo local de prueba.", "error");
    render();
    return;
  }

  try {
    const data = await apiGetReservas();
    if (!data.ok) {
      throw new Error(data.error || "No se pudieron cargar las reservas");
    }
    usandoModoLocal = false;
    reservasCache = data.reservas || [];
    setStatus("Reservas actualizadas.", "ok");
    render();
  } catch (err) {
    usandoModoLocal = true;
    reservasCache = getFallbackReservas();
    setStatus("No se pudo conectar con Google Sheets.", "error");
    render();
  }
}

async function reservar(id) {
  const nombre = document.getElementById("n" + id).value.trim();
  const email = document.getElementById("e" + id).value.trim().toLowerCase();

  if (!nombre || !email) {
    alert("Debes completar nombre y email");
    return;
  }

  if (usandoModoLocal) {
    const r = getFallbackReservas();
    if (r.find(x => x.email === email)) {
      alert("Ya tienes una reserva");
      return;
    }
    const turno = TURNOS.find(t => t.id === id);
    const ocupadas = r.filter(x => Number(x.turno) === id).length;
    if (ocupadas >= turno.plazas) {
      alert("Este turno ya está completo");
      return;
    }
    r.push({
      turno: id,
      descripcion: turno.descripcion,
      nombre,
      email,
      fechaReserva: new Date().toLocaleString("es-ES")
    });
    saveFallbackReservas(r);
    reservasCache = r;
    render();
    return;
  }

  try {
    const result = await apiCrearReserva({
      turno: id,
      nombre,
      email
    });

    if (!result.ok) {
      alert(result.error || "No se pudo guardar la reserva");
      return;
    }

    reservasCache = result.reservas || [];
    render();
  } catch (err) {
    alert("Error al guardar la reserva");
  }
}

async function resetReservas() {
  const password = prompt("Introduce la contraseña para resetear las plazas:");
  if (password === null) return;

  const confirmar = confirm("¿Seguro que quieres borrar todas las reservas y poner los contadores a 0?");
  if (!confirmar) return;

  if (usandoModoLocal) {
    if (password !== PASSWORD_RESET) {
      alert("Contraseña incorrecta");
      return;
    }
    localStorage.removeItem(STORAGE_FALLBACK_KEY);
    reservasCache = [];
    render();
    alert("Reservas reseteadas correctamente");
    return;
  }

  try {
    const result = await apiReset(password);

    if (!result.ok) {
      alert(result.error || "No se pudo resetear");
      return;
    }

    reservasCache = result.reservas || [];
    render();
    alert("Reservas reseteadas correctamente");
  } catch (err) {
    alert("Error al resetear");
  }
}

function exportarExcel() {
  const reservas = getReservas();

  let workbook = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:html="http://www.w3.org/TR/REC-html40">
  <Styles>
    <Style ss:ID="Header">
      <Font ss:Bold="1"/>
      <Interior ss:Color="#D9EAD3" ss:Pattern="Solid"/>
    </Style>
  </Styles>`;

  TURNOS.forEach(turno => {
    const datos = reservas.filter(r => Number(r.turno) === turno.id);
    workbook += `
  <Worksheet ss:Name="${escapeXml(turno.nombre)}">
    <Table>
      <Row>
        <Cell ss:StyleID="Header"><Data ss:Type="String">Turno</Data></Cell>
        <Cell ss:StyleID="Header"><Data ss:Type="String">Descripción</Data></Cell>
        <Cell ss:StyleID="Header"><Data ss:Type="String">Nombre</Data></Cell>
        <Cell ss:StyleID="Header"><Data ss:Type="String">Email</Data></Cell>
        <Cell ss:StyleID="Header"><Data ss:Type="String">Fecha reserva</Data></Cell>
      </Row>`;

    if (datos.length === 0) {
      workbook += `
      <Row>
        <Cell><Data ss:Type="String">${escapeXml(turno.nombre)}</Data></Cell>
        <Cell><Data ss:Type="String">${escapeXml(turno.descripcion)}</Data></Cell>
        <Cell><Data ss:Type="String"></Data></Cell>
        <Cell><Data ss:Type="String"></Data></Cell>
        <Cell><Data ss:Type="String"></Data></Cell>
      </Row>`;
    } else {
      datos.forEach(item => {
        workbook += `
      <Row>
        <Cell><Data ss:Type="String">${escapeXml(turno.nombre)}</Data></Cell>
        <Cell><Data ss:Type="String">${escapeXml(item.descripcion || turno.descripcion)}</Data></Cell>
        <Cell><Data ss:Type="String">${escapeXml(item.nombre)}</Data></Cell>
        <Cell><Data ss:Type="String">${escapeXml(item.email)}</Data></Cell>
        <Cell><Data ss:Type="String">${escapeXml(item.fechaReserva || "")}</Data></Cell>
      </Row>`;
      });
    }

    workbook += `
    </Table>
  </Worksheet>`;
  });

  workbook += `
</Workbook>`;

  const blob = new Blob([workbook], { type: "application/vnd.ms-excel" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "reservas_aira_por_turnos.xls";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

recargarReservas();
</script>

</body>
</html>
